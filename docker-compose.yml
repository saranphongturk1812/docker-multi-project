name: laravel-multi

x-php-service: &php-service
  build:
    context: .
    dockerfile: docker/php/Dockerfile
  environment:
    TMPDIR: /tmp
    TEMP: /tmp
    TMP: /tmp
  restart: unless-stopped
  networks:
    - laravel
  depends_on:
    mysql:
      condition: service_healthy

x-nginx-service: &nginx-service
  image: nginx:1.27-alpine
  restart: unless-stopped
  networks:
    - laravel

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_shared
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: phpmyadmin_shared
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "8080:80"
    networks:
      - laravel

  project1_app:
    <<: *php-service
    container_name: project1_app
    working_dir: /var/www
    volumes:
      - ./projects/project1:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    extra_hosts:
      - host.docker.internal:host-gateway

  project1_nginx:
    <<: *nginx-service
    container_name: project1_nginx
    depends_on:
      - project1_app
    ports:
      - "8001:80"
    volumes:
      - ./projects/project1:/var/www
      - ./docker/nginx/project1.conf:/etc/nginx/conf.d/default.conf:ro

  project2_app:
    <<: *php-service
    container_name: project2_app
    working_dir: /var/www
    volumes:
      - ./projects/project2:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    extra_hosts:
      - host.docker.internal:host-gateway

  project2_nginx:
    <<: *nginx-service
    container_name: project2_nginx
    depends_on:
      - project2_app
    ports:
      - "8002:80"
    volumes:
      - ./projects/project2:/var/www
      - ./docker/nginx/project2.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  laravel:
    driver: bridge

volumes:
  mysql_data:
